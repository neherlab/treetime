on:
  push:
    branches:
      - rust

  pull_request:

  repository_dispatch:
    types: build

  workflow_dispatch:

  workflow_call:

concurrency:
  group: cli-${{ github.workflow }}-${{ github.ref_type }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

env:
  GITHUB_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
  VERBOSE: 1



jobs:

  build-cli:
    name: "build-cli (${{ matrix.arch }})"
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64-apple-darwin
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-apple-darwin
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true
          lfs: true

      # - name: "Free disk space"
      #   uses: ./.github/actions/free-disk-space

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup cache for Rust and Cargo"
        uses: actions/cache@v4
        with:
          path: |
            .cache/docker-${{ matrix.arch }}/cargo/registry/index/
            .cache/docker-${{ matrix.arch }}/cargo/registry/cache/
            .cache/docker-${{ matrix.arch }}/cargo/git/db/
            .cache/docker-${{ matrix.arch }}/sccache/
          key: neherlab-treetime-cli-cache-v2-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-${{ matrix.arch }}-
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_TOKEN }}

      - name: "Prepare .env file"
        run: |
          cp .env.example .env

      - name: "Build docker image (${{ matrix.arch }})"
        run: |
          CROSS_COMPILE="${{ matrix.arch }}" ./dev/docker/run echo "Success"

      - name: "Build CLI (${{ matrix.arch }})"
        run: |
          CROSS_COMPILE="${{ matrix.arch }}" ./dev/docker/run ./dev/cross/build treetime

      - uses: actions/upload-artifact@v4
        with:
          name: treetime-${{ matrix.arch }}
          path: ./.out/*
          include-hidden-files: true



  run-unit-tests:
    name: "Run unit tests"
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true
          lfs: true

      # - name: "Free disk space"
      #   uses: ./.github/actions/free-disk-space

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup cache for Rust and Cargo"
        uses: actions/cache@v4
        with:
          path: |
            .cache/docker-native/cargo/registry/index/
            .cache/docker-native/cargo/registry/cache/
            .cache/docker-native/cargo/git/db/
            .cache/docker-native/sccache/
          key: neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_TOKEN }}

      - name: "Prepare .env file"
        run: |
          cp .env.example .env

      - name: "Build docker image"
        run: |
          ./dev/docker/run echo "Success"

      - name: "Run unit tests"
        run: |
          ./dev/docker/run ./dev/dev test-all



  run-lints:
    name: "Run lints"
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true
          lfs: true

      # - name: "Free disk space"
      #   uses: ./.github/actions/free-disk-space

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup cache for Rust and Cargo"
        uses: actions/cache@v4
        with:
          path: |
            .cache/docker-native/cargo/registry/index/
            .cache/docker-native/cargo/registry/cache/
            .cache/docker-native/cargo/git/db/
            .cache/docker-native/sccache/
          key: neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_TOKEN }}

      - name: "Prepare .env file"
        run: |
          cp .env.example .env

      - name: "Build docker image"
        run: |
          ./dev/docker/run echo "Success"

      - name: "Run lints"
        run: |
          ./dev/docker/run ./dev/dev lint-ci

