on:
  push:
    branches:
      - rust

  pull_request:

  repository_dispatch:
    types: build

  workflow_dispatch:

concurrency:
  group: cli-${{ github.workflow }}-${{ github.ref_type }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

env:
  TREETIME_BUILD_MODE: dev
  TREETIME_VERSION_SUFFIX: ""
  VERBOSE: 1



jobs:

  build-cli:
    name: "Build CLI"
    uses: ./.github/workflows/cli-build.yml
    with:
      source_ref: ${{ github.sha }}
      build_mode: dev
    secrets: inherit



  run-unit-tests:
    name: "Run unit tests"
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          submodules: true
          lfs: true

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup cache for Rust and Cargo"
        uses: actions/cache@v4
        with:
          path: |
            .cache/docker-native/cargo/registry/index/
            .cache/docker-native/cargo/registry/cache/
            .cache/docker-native/cargo/git/db/
            .cache/docker-native/sccache/
          key: neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_TOKEN }}

      - name: "Prepare .env file"
        run: |
          cp .env.example .env

      - name: "Build docker image"
        run: |
          ./dev/docker/run echo "Success"

      - name: "Run unit tests"
        run: |
          ./dev/docker/run ./dev/dev test-all



  run-lints:
    name: "Run lints"
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          submodules: true
          lfs: true

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Setup cache for Rust and Cargo"
        uses: actions/cache@v4
        with:
          path: |
            .cache/docker-native/cargo/registry/index/
            .cache/docker-native/cargo/registry/cache/
            .cache/docker-native/cargo/git/db/
            .cache/docker-native/sccache/
          key: neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-${{ hashFiles('**/Cargo.lock') }}
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-native-
            neherlab-treetime-cli-cache-v2-${{ runner.os }}-

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_USERNAME }}
          password: ${{ secrets.NEHERLAB_BOT_DOCKERHUB_TOKEN }}

      - name: "Prepare .env file"
        run: |
          cp .env.example .env

      - name: "Build docker image"
        run: |
          ./dev/docker/run echo "Success"

      - name: "Run lints"
        run: |
          ./dev/docker/run ./dev/dev lint-ci

  run-compat-tests-x86_64-unknown-linux-gnu:
    name: "Compat test (x86_64-unknown-linux-gnu)"
    needs: [ build-cli ]
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          submodules: true
          lfs: true

      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: treetime-*
          merge-multiple: true
          path: ".out"

      - name: "Test Linux distros compatibility"
        run: |
          chmod +x ./.out/treetime-x86_64-unknown-linux-gnu
          ./dev/test-linux-distros-gnu ./.out/treetime-x86_64-unknown-linux-gnu --help

  run-compat-tests-x86_64-unknown-linux-musl:
    name: "Compat test (x86_64-unknown-linux-musl)"
    needs: [ build-cli ]
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          submodules: true
          lfs: true

      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: treetime-*
          merge-multiple: true
          path: ".out"

      - name: "Test Linux distros compatibility"
        run: |
          chmod +x ./.out/treetime-x86_64-unknown-linux-musl
          ./dev/test-linux-distros-musl ./.out/treetime-x86_64-unknown-linux-musl --help

  run-compat-tests-macos:
    name: "Compat test (macOS, ${{ matrix.name }})"
    needs: [ build-cli ]
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "x86_64 native"
            runner: macos-15-intel
            binary: treetime-x86_64-apple-darwin
            expected_arch: x86_64

          - name: "aarch64 native, macos-14"
            runner: macos-14
            binary: treetime-aarch64-apple-darwin
            expected_arch: arm64

          - name: "aarch64 native, macos-latest"
            runner: macos-latest
            binary: treetime-aarch64-apple-darwin
            expected_arch: arm64

    steps:
      - name: "Show system info"
        run: |
          set -x
          uname -a || true
          sw_vers || true
          system_profiler SPSoftwareDataType SPHardwareDataType || true

      - name: "Check CPU architecture"
        run: |
          arch="$(uname -m)"
          expected="${{ matrix.expected_arch }}"
          if [[ "$arch" != "$expected" ]]; then
            echo "Expected $expected architecture, but got $arch"
            exit 1
          fi

      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: treetime-*
          merge-multiple: true
          path: ".out"

      - name: "Run compat test"
        run: |
          chmod +x ./.out/*
          ./.out/${{ matrix.binary }} --help


  run-compat-tests-x86_64-pc-windows-gnu:
    name: "Compat test (x86_64-pc-windows-gnu)"
    needs: [ build-cli ]
    runs-on: windows-2022

    steps:
      - name: "Show system info"
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSDebug -Trace 1
          Write-Output "Architecture: $env:PROCESSOR_ARCHITECTURE"
          Write-Output "Windows Version:"
          systeminfo | Select-String "OS Name", "OS Version"
          Get-WmiObject Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors | Format-Table -AutoSize

      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: treetime-*
          merge-multiple: true
          path: ".out"

      - name: "Run compat test (x86_64-pc-windows-gnu)"
        shell: powershell
        run: |
          .\.out\treetime-x86_64-pc-windows-gnu --help


  check-cli-docs:
    name: "Check that autogenerated CLI documentation is up-to-date"
    needs: [ build-cli ]
    runs-on: ubuntu-24.04

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          submodules: true
          lfs: true

      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: treetime-*
          merge-multiple: true
          path: ".out"

      - name: "Re-generate CLI docs"
        run: |
          chmod +x ./.out/treetime-x86_64-unknown-linux-gnu
          ./docs/generate-reference-docs ./.out/treetime-x86_64-unknown-linux-gnu docs/docs/reference.md

      - name: "Check that the git diff is clean"
        run: |
          git -c color.ui=always diff --exit-code "docs/docs/reference.md" || (printf "CLI reference documentation is not up-to-date. Run './dev/docker/run ./dev/dev D', then verify and commit docs/docs/reference.md.\n" >&2; exit 1)
