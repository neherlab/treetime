[package]
name = "treetime-validation"
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
version.workspace = true

[lib]
crate-type = ["lib"]

[dependencies]
# [internal]
treetime-analytical = { workspace = true }
treetime-io = { workspace = true }
treetime-ops = { workspace = true }
treetime-utils = { workspace = true }

# [external]
approx = { workspace = true }
clap = { workspace = true }
eyre = { workspace = true }
image = { workspace = true, optional = true }
itertools = { workspace = true }
num = { workspace = true }
num-traits = { workspace = true }
ordered-float = { workspace = true }
plotters = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smart-default = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }

[features]
"png" = ["image", "plotters/bitmap_backend", "plotters/ttf"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
csv = { workspace = true }
ndarray = { workspace = true }
ndarray-conv = { workspace = true }
ndarray-stats = { workspace = true }
statrs = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
ctor = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
rstest_reuse = { workspace = true }

[lints]
workspace = true
