[package]
name = "treetime"
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
# [internal]
treetime-distribution = { workspace = true }
treetime-graph = { workspace = true }
treetime-io = { workspace = true }
treetime-primitives = { workspace = true }
treetime-utils = { workspace = true }

# [external]
approx = { workspace = true }
argmin = { workspace = true }
argmin-math = { workspace = true }
auto_ops = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
color-eyre = { workspace = true }
comfy-table = { workspace = true }
crossbeam-queue = { workspace = true }
crossbeam-skiplist = { workspace = true }
eyre = { workspace = true }
getset = { workspace = true }
image = { workspace = true, optional = true }
indexmap = { workspace = true }
itertools = { workspace = true }
log = { workspace = true }
maplit = { workspace = true }
num = { workspace = true }
num-traits = { workspace = true }
ordered-float = { workspace = true }
parking_lot = { workspace = true }
plotters = { workspace = true }
rand = { workspace = true }
rand_distr = { workspace = true }
regex = { workspace = true }
rgb = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smart-default = { workspace = true }
strum_macros = { workspace = true }
tikv-jemallocator = { workspace = true, optional = true }

[target.'cfg(all(target_arch = "x86_64", target_os = "linux", target_env = "gnu"))'.dependencies]
tikv-jemallocator = { workspace = true }

[target.'cfg(all(target_arch = "aarch64", target_os = "linux", target_env = "gnu"))'.dependencies]
tikv-jemallocator = { workspace = true }

[target.'cfg(all(target_arch = "x86_64", target_os = "linux", target_env = "musl"))'.dependencies]
tikv-jemallocator = { workspace = true }

[target.'cfg(all(target_arch = "aarch64", target_os = "linux", target_env = "musl"))'.dependencies]
tikv-jemallocator = { workspace = true }

[features]
"png" = ["image", "plotters/bitmap_backend", "plotters/ttf"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
blas-src = { workspace = true }
crossterm = { workspace = true }
ndarray = { workspace = true }
ndarray-linalg = { workspace = true }
ndarray-stats = { workspace = true }
openblas-src = { workspace = true }
statrs = { workspace = true }
textplots = { workspace = true }

[dev-dependencies]
bio = { workspace = true }
criterion = { workspace = true }
ctor = { workspace = true }
indoc = { workspace = true }
lazy_static = { workspace = true }
petgraph = { workspace = true }
treetime-grid = { workspace = true }
pretty_assertions = { workspace = true }
proptest = { workspace = true }
rayon = { workspace = true }
rstest = { workspace = true }
rstest_reuse = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "find_letter_ranges_benchmark"
harness = false

[[bench]]
name = "vec_char_to_string"
harness = false
