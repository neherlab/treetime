default_job = "check"

[jobs.check]
command = ["cargo", "clippy", "--all-targets", "--workspace", "--target-dir=.build/docker"]
need_stdout = false

[jobs.server]
command = ["cargo", "run", "--bin", "treetime-server", "--target-dir=.build/docker"]
need_stdout = true
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
